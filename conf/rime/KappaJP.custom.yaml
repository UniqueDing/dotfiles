# KappaJP.custom.yaml

patch:
  "schema/icon": icon/jp.ico
  "schema/name": 日语
  switches:
    - name: kata
      reset: 0
      states: [ひ, カ]
    - name: full_shape
      reset: 0
      states: ["半", "全"]
  "key_binder/bindings":
    - { when: has_menu, accept: semicolon, send: 2 }
    - { accept: "Shift+space", select: latin, when: always }
    - { accept: "Control+semicolon", toggle: kata, when: always }