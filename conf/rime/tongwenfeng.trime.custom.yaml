local:
  7keys:
    width: 12.5
    key_text_offset_y: 1.8
    # height: 60
    ascii_mode: 0
    keys:
      - {click: w, long_click: '@', swipe_down: '@', key_back_color: bh2, key_text_color: th2}
      - {click: f, long_click: '#', swipe_down: '#', key_back_color: bh2, key_text_color: th2}
      - {click: p, long_click: '%', swipe_down: '%', key_back_color: bh2, key_text_color: th2}
      - {click: g, long_click: '$', swipe_down: '$', key_back_color: bh2, key_text_color: th2}
      - {click: j, long_click: '~', swipe_down: '~', key_back_color: bh2, key_text_color: th2}
      - {click: l, long_click: '…', swipe_down: '…', key_back_color: bh2, key_text_color: th2}
      - {click: u, long_click: '`', swipe_down: '`', key_back_color: bh2, key_text_color: th2}
      - {width: 12.5}
      
      - {click: q, long_click: '!', swipe_down: '!', key_back_color: bh2, key_text_color: th2}
      - {click: a, long_click: '|', swipe_down: '|', key_back_color: bh2, key_text_color: th2}
      - {click: r, long_click: '&', swipe_down: '&', key_back_color: bh2, key_text_color: th2}
      - {click: s, long_click: "'", swipe_down: "'", key_back_color: bh2, key_text_color: th2}
      - {click: t, long_click: '"', swipe_down: '"', key_back_color: bh2, key_text_color: th2}
      - {click: d, long_click: '*', swipe_down: '*', key_back_color: bh2, key_text_color: th2}
      - {click: y, long_click: '\', swipe_down: '\', key_back_color: bh2, key_text_color: th2}
      - {width: 12.5}

      - {click: z, long_click: '/', swipe_down: '/', key_back_color: bh2, key_text_color: th2}
      - {click: h, long_click: '+', swipe_down: '+', key_back_color: bh2, key_text_color: th2}
      - {click: n, long_click: '-', swipe_down: '-', key_back_color: bh2, key_text_color: th2}
      - {click: e, long_click: "=", swipe_down: "=", key_back_color: bh2, key_text_color: th2}
      - {click: i, long_click: '·', swipe_down: '·', key_back_color: bh2, key_text_color: th2}
      - {click: o, long_click: '^', swipe_down: '^', key_back_color: bh2, key_text_color: th2}
      - {click: m, long_click: '{}{Left}', swipe_down: '{}{Left}', key_back_color: bh2, key_text_color: th2}
      - {width: 12.5}
      
      - {click: BackSpace, key_back_color: bbs, key_text_color: tbs, key_text_offset_y: -1}
      - {click: x, long_click: '_', swipe_down: '_', key_back_color: bh2, key_text_color: th2}
      - {click: c, long_click: '?', swipe_down: '?', key_back_color: bh2, key_text_color: th2}
      - {click: v, long_click: '<>{Left}', swipe_down: '<>{Left}', key_back_color: bh2, key_text_color: th2}
      - {click: b, long_click: '(){Left}', swipe_down: '(){Left}', key_back_color: bh2, key_text_color: th2}
      - {click: k, long_click: "[]{Left}", swipe_down: "[]{Left}", key_back_color: bh2, key_text_color: th2}
      - {click: Shift_L, composing: delimiter, hilited_key_back_color: benter, hilited_key_text_color: tenter, key_back_color: bbs, key_text_color: tbs, key_text_offset_y: -1}
      - {width: 12.5} 
      
      - {click: Return, composing: Return1, key_back_color: benter, key_text_color: tenter, key_text_offset_y: -2}
      - {click: Mode_CN_latin, width: 10, key_text_size: 16, long_click: Schema_switch, key_back_color: bh4, key_text_color: th4}
      - {click: ',', width: 10, label_symbol: '❐', long_click: copy, key_back_color: bh4, key_text_color: th4}
      - {click: space, width: 22.5, label_symbol: '☑', swipe_left: "Left", swipe_right: "Right", swipe_up: "Up", swipe_down: "Down", long_click: select_all, key_back_color: bkg, key_text_color: tkg}
      - {click: '.', width: 10, label_symbol: '▣', long_click: paste_clip, key_back_color: bh4, key_text_color: th4}
      - {click: ';', width: 10, long_click: ':', swipe_down: ':', key_back_color: bh4, key_text_color: th4}
      - {click: Keyboard_number, long_click: Keyboard_bqrw, swipe_down: Menu, hint: '_', key_back_color: bgn, key_text_color: tgn}
      - {width: 12.5} 
      
      - {click: 1, key_back_color: bh2, key_text_color: th2, key_text_offset_y: 1, width: 8.75, height: 12, key_text_size: 16}
      - {click: 2, key_back_color: bh2, key_text_color: th2, key_text_offset_y: 1, width: 8.75, key_text_size: 16}
      - {click: 3, key_back_color: bh2, key_text_color: th2, key_text_offset_y: 1, width: 8.75, key_text_size: 16}
