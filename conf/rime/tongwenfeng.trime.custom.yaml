# Trime custom style settings
# 该项encoding: utf-8
patch:
  "style/comment_on_top": false
  "style/round_corner": 8
  "style/vertical_gap": 4
  "style/keyboard_height":  250
  # "style/enter_labels":  # 定义Enter键的文本
  #   go: ➤
  #   done: ✔
  #   next: ⮧
  #   pre:  ⮥
  #   search: ⌕
  #   send: ➤
  #   default: ➤   # 定义默认Enter键的文本
  # "preset_keys/Shift_L": {label: '⇧', functional: false, send: Shift_L}
  "preset_keys/BackSpace": {label: 'BS', preview: '⇦', repeatable: true, functional: false, send: BackSpace}
  "preset_keys/Escape": {label: 'Esc', functional: false, send: Escape}
  "preset_keys/Tab": {label: 'Tab', functional: false, send: Tab}
  "preset_keys/Alt_L": {label: 'Alt', functional: false, send: Alt_L}
  "preset_keys/Control_L": {label: 'Ctrl', functional: false, send: Control_L}
  "preset_keys/Mode_switch_CN": {toggle: ascii_mode, functional: false, send: Mode_switch, states: [ 文, A ]}
  "preset_keys/Mode_switch_JP": {toggle: ascii_mode, functional: false, send: Mode_switch, states: [ あ, A ]}
  "preset_keys/Mode_switch_KR": {toggle: ascii_mode, functional: false, send: Mode_switch, states: [ 한, A ]}
  "preset_keys/Mode_next": {functional: false, send: Control+Shift+F2, label: A }
  "preset_keys/Mode_CN_latin": {functional: false, send: Control+Shift+F1, label: 文 }
  "preset_keys/Mode_JP_latin": {functional: false, send: Control+Shift+F1, label: あ }
  "preset_keys/Mode_KR_latin": {functional: false, send: Control+Shift+F1, label: 한 }
  "preset_keys/Schema_switch": {label: 🌐, functional: false, send: Menu}
  "preset_keys/Mode_zhsimp": { toggle: zh_simp, send: Mode_switch, functional: false, states: [ 简, 繁 ]}
  "preset_keys/Mode_kata": { toggle: kata, send: Mode_switch, functional: false, states: [ひ, カ]}
  "preset_keys/Bing": {label: ⌕, send: function, command: run, option: "https://bing.com/search?q=%4$s"}
  "preset_keys/Page_Down": {label: ⤵, send: Page_Down, functional: false}

  liquid_keyboard/fixed_key_bar:
    position: left
    keys: 
      - space1
      - BackSpace
      - Return2
      - liquid_keyboard_exit
      - liquid_keyboard_tabs

  tool_bar:
    button_spacing: 5 # 按钮间距
    button_font: iconfont.ttf # 按钮字体

    hide_button: &hide_button
      foreground:
        style: "ic@keyboard_close"
        fg_normal: candidate_text_color
      action: Hide

    emoji_button: &emoji_button
      foreground:
        style: "ic@emoticon"
      action: liquid_keyboard_emoji

    clipboard_button: &clipboard_button
      foreground:
        style: "ic@clipboard"
      action: liquid_keyboard_clipboard

    edit_button: &edit_button
      foreground:
        style: "ic@cursor-move"
      action: Keyboard_numberb

    redo_button: &redo_button
      foreground:
        style: "ic@redo"
      action: redo

    undo_button: &undo_button
      foreground:
        style: "ic@undo"
      action: undo

    scheme_button: &scheme_button
      foreground:
        style: "ic@web"
      action: Schema_switch

    # 右侧按钮列表（从右向左排列）
    buttons: [ *redo_button, *undo_button, *clipboard_button, *edit_button, *emoji_button, *scheme_button, *hide_button ]

  "preset_keyboards/default":
    author: "UniqueDing"
    name: 26 default cn
    __include: local/10keys    
    __patch:
      "keys/@9/click": Mode_zhsimp
      "keys/@36/click": Mode_switch_CN

  "preset_keyboards/tigress":
    author: "UniqueDing"
    name: 26 tigress
    __include: local/10keys
    __patch:
      "keys/@9/click": Mode_zhsimp
      "keys/@36/click": Mode_switch_CN

  "preset_keyboards/latin":
    author: "UniqueDing"
    name: 26 latin
    __include: local/10keys
    __patch:
      "keys/@36/click": Mode_next

  "preset_keyboards/japanese":
    author: "UniqueDing"
    name: 26 japanese
    __include: local/10keys
    __patch:
      "keys/@9/click": Mode_kata
      "keys/@36/click": Mode_switch_JP

  "preset_keyboards/KappaJP":
    author: "UniqueDing"
    name: 26 KappaJP
    __include: local/10keys
    __patch:
      "keys/@9/click": Mode_kata
      "keys/@36/click": Mode_switch_JP

  "preset_keyboards/hangeul2set":
    author: "UniqueDing"
    name: 26 hangeul2set
    __include: local/10keys
    __patch:
      "keys/@9/long_click": ""
