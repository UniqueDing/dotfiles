      "keys/@30/label": ㅜ
      "keys/@31/label": ㅡ

  "preset_keyboards/number":
    author: "ChiesiMario"
    name: 數字
    width: 18
  # height: 48
    ascii_mode: 1
    keys:
    
      - {click: 1, key_back_color: key_back_color, key_text_color: key_text_color}
      - {click: 2, key_back_color: key_back_color, key_text_color: key_text_color}
      - {click: 3, key_back_color: key_back_color, key_text_color: key_text_color}
      - {click: '+', long_click: '@', swipe_down: '@', key_text_size: 20, key_back_color: bgn, key_text_color: tgn, key_text_offset_y: 5}
      - {click: '*', long_click: '^', swipe_down: '^', key_text_size: 20, key_back_color: bgn, key_text_color: tgn, key_text_offset_y: 5}
      - {width: 10, key_back_color: bh2, key_text_color: th2}


      - {click: 4, key_back_color: key_back_color, key_text_color: key_text_color}
      - {click: 5, key_back_color: key_back_color, key_text_color: key_text_color}
      - {click: 6, key_back_color: key_back_color, key_text_color: key_text_color}
      - {click: '-', long_click: '_', swipe_down: '_', key_text_size: 20, key_back_color: bgn, key_text_color: tgn, key_text_offset_y: 5}
      - {click: '/', long_click: '%', swipe_down: '%', key_text_size: 20, key_back_color: bgn, key_text_color: tgn, key_text_offset_y: 5}
      - {width: 10, key_back_color: bh2, key_text_color: th2}

      - {click: 7, key_back_color: key_back_color, key_text_color: key_text_color}
      - {click: 8, key_back_color: key_back_color, key_text_color: key_text_color}
      - {click: 9, key_back_color: key_back_color, key_text_color: key_text_color}
      - {click: '=', long_click: '≠', swipe_down: '≠', key_back_color: bgn, key_text_color: tgn}
      - {click: BackSpace, key_back_color: bbs, key_text_color: tbs}
      - {width: 10, key_back_color: bh2, key_text_color: th2}

      - {click: Return, key_back_color: benter, key_text_color: tenter}
      - {click: 0, key_back_color: key_back_color, key_text_color: key_text_color}
      - {click: '.', long_click: ',', swipe_down: ',', key_back_color: bgn, key_text_color: tgn}
      - {click: space1, key_back_color: bgn, key_text_color: tgn}
      - {click: Keyboard_default, key_back_color: bgn, key_text_color: 'tgn'}
      - {width: 10, key_back_color: bh2, key_text_color: th2}

      - {height: 10, width: 100}



  preset_color_schemes:
    fira_dark:
      # 顏色定義
      1: &fira_dark_color1 0xffF1F1F1 # 主要文本色
      2: &fira_dark_color2 0xff393c3f # 主要按鍵背景色
      3: &fira_dark_color3 0xff000000 # 主要背景色
      4: &fira_dark_color4 0xff676767 # 功能鍵背景色
      6: &fira_dark_color5 0xff2472e1 # 強調背景色 
      7: &fira_dark_color6 0xff000000 # 強調文本色 
      8: &fira_dark_color7 0xffB6B6B6 # 次要文本色
      # ----------------------------------------
      name: "Fira Dark"  # 方案名稱
      author: ChiesiMario # 作者信息
      light_scheme: fira_light # 視當前為深色模式的配色。当系统切换为淺色模式后，切換至該主題
      back_color: *fira_dark_color3 # 候選區背景狀態欄
      border_color: *fira_dark_color1 # 邊框顏色
      candidate_separator_color: *fira_dark_color7 # 候選分割背景
      candidate_text_color: *fira_dark_color1 # 候選文本
      comment_text_color: *fira_dark_color7 # 提示 
      hilited_back_color: *fira_dark_color3 # 高亮編碼背景
      hilited_candidate_back_color: *fira_dark_color3 # 高亮候選背景
      hilited_candidate_text_color: *fira_dark_color5 # 高亮候選文本
      hilited_comment_text_color: *fira_dark_color7 # 高亮提示
      hilited_key_back_color: *fira_dark_color5 # 高亮按鍵背景
      hilited_key_symbol_color: *fira_dark_color6 # 高亮按鍵符號
      hilited_key_text_color: *fira_dark_color6 # 高亮按鍵文本
      hilited_off_key_back_color: *fira_dark_color5 # 高亮按鍵關閉狀態背景
      hilited_off_key_text_color: *fira_dark_color6 # 高亮按鍵關閉狀態文本
      hilited_text_color: *fira_dark_color1 # 高亮編碼
      key_back_color: *fira_dark_color2 # 按鍵背景
      key_symbol_color: *fira_dark_color7 # 按鍵符號
      key_text_color: *fira_dark_color1 # 按鍵文本
      keyboard_back_color: *fira_dark_color3 # 鍵盤背景
      label_color: *fira_dark_color5 # 標籤
      off_key_back_color: *fira_dark_color4  # 按鍵關閉狀態背景
      off_key_text_color: *fira_dark_color7 # 按鍵關閉狀態文本
      preview_back_color: *fira_dark_color4 # 按鍵提示背景
      preview_text_color: *fira_dark_color5 # 按鍵提示文本
      text_color: *fira_dark_color5 # 編碼
      text_back_color: *fira_dark_color3 # 編碼區背景
      bkg: *fira_dark_color2 # 空格鍵背景色
      tkg: *fira_dark_color1 # 空格鍵文字顏色
      benter: *fira_dark_color5 # 回車鍵背景色
      tenter: *fira_dark_color6 # 回車鍵文字顏色
      bgn: *fira_dark_color4 # 功能鍵背景色
      tgn: *fira_dark_color1 # 功能鍵文字顏色
      bbs: *fira_dark_color4 # 退格鍵背景色
      tbs: *fira_dark_color1 # 退格鍵文字顏色
      baoe: *fira_dark_color2 # aoeiu 背景色
      taoe: *fira_dark_color5 # aoeiu 文字顏色
      bh1: *fira_dark_color2 # 第一行背景色
