patch:
  schema_list:
    - schema: latin
    - schema: wubi86
    - schema: tigress
    - schema: japanese
    - schema: hangeul2set
    - schema: pinyin_simp

  key_binder:
    bindings:
      - { when: has_menu, accept: minus, send: Page_Up }
      - { when: has_menu, accept: equal, send: Page_Down }
      - { when: composing, accept: Escape, send: Escape }
      - { when: always, accept: Escape, toggle: ascii_mode }
      - { when: always, accept: Control+Shift+F1, select: latin }
      - { when: always, accept: Control+Shift+F2, select: .next }

  switcher:
    caption: select
    hotkeys:
      - Control+backslash

  /page_size: 9 # 候选词个数
  ascii_composer:
    good_old_caps_lock: true
    switch_key:
      Shift_L: inline_ascii
      Shift_R: noop
      Control_L: noop
      Control_R: noop
      Caps_Lock: noop
      Eisu_toggle: noop